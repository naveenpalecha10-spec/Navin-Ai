<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navin AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #chatbox { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: scroll; }
        #user-input { width: 100%; }
    </style>
</head>
<body>
    <h1>Navin AI Chatbot</h1>
    <div id="chatbox"></div>
    <input type="text" id="user-input" placeholder="Type your message..." />
    <script>
        // Example chatbot interaction
        const chatbox = document.getElementById('chatbox');
        const userInput = document.getElementById('user-input');

        userInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const userMessage = userInput.value;
                chatbox.innerHTML += '<div>User: ' + userMessage + '</div>';
                userInput.value = '';
                // Simulate chatbot response
                setTimeout(() => {
                    chatbox.innerHTML += '<div>Navin AI: Hello, how can I assist you today?</div>';
                    chatbox.scrollTop = chatbox.scrollHeight;
                }, 1000);
            }
        });
    </script>
</body>
</html>
